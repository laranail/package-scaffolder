openapi: 3.1.0
info:
  title: Blog REST API
  version: "1.0"
  description: >
    REST API for the Blog package. Reads are public; writes require the
    configured auth middleware (Sanctum by default).
  license:
    name: MIT
servers:
  - url: /api/v1
tags:
  - name: Posts
  - name: Categories
  - name: Comments
  - name: Meta
paths:
  /ping:
    get:
      tags: [Meta]
      summary: Health/version check
      responses:
        "200":
          description: OK
  /posts:
    get:
      tags: [Posts]
      summary: List published posts
      parameters:
        - { name: status, in: query, schema: { type: string, enum: [draft, scheduled, published, archived] } }
        - { name: category, in: query, schema: { type: string } }
        - { name: search, in: query, schema: { type: string, maxLength: 255 } }
        - { name: sort, in: query, schema: { type: string, enum: [published_at, created_at, title] } }
        - { name: direction, in: query, schema: { type: string, enum: [asc, desc] } }
        - { name: per_page, in: query, schema: { type: integer, minimum: 1, maximum: 100 } }
      responses:
        "200": { description: A paginated list of posts }
        "422": { description: Validation error }
    post:
      tags: [Posts]
      summary: Create a post
      security: [{ sanctum: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PostInput" }
      responses:
        "201": { description: Created }
        "401": { description: Unauthenticated }
        "422": { description: Validation error }
  /posts/{post}:
    parameters:
      - { name: post, in: path, required: true, schema: { type: string }, description: Post slug }
    get:
      tags: [Posts]
      summary: Show a post
      responses:
        "200": { description: OK }
        "404": { description: Not found or not published }
    put:
      tags: [Posts]
      summary: Update a post
      security: [{ sanctum: [] }]
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PostInput" }
      responses:
        "200": { description: Updated }
        "403": { description: Forbidden }
        "422": { description: Validation error }
    delete:
      tags: [Posts]
      summary: Soft-delete a post
      security: [{ sanctum: [] }]
      responses:
        "204": { description: Deleted }
        "403": { description: Forbidden }
  /posts/{post}/publish:
    post:
      tags: [Posts]
      summary: Publish a post
      security: [{ sanctum: [] }]
      parameters: [{ name: post, in: path, required: true, schema: { type: string } }]
      responses: { "200": { description: Published } }
  /posts/{post}/unpublish:
    post:
      tags: [Posts]
      summary: Unpublish a post
      security: [{ sanctum: [] }]
      parameters: [{ name: post, in: path, required: true, schema: { type: string } }]
      responses: { "200": { description: Unpublished } }
  /posts/{post}/restore:
    post:
      tags: [Posts]
      summary: Restore a soft-deleted post
      security: [{ sanctum: [] }]
      parameters: [{ name: post, in: path, required: true, schema: { type: string } }]
      responses: { "200": { description: Restored } }
  /posts/{post}/force:
    delete:
      tags: [Posts]
      summary: Permanently delete a post
      security: [{ sanctum: [] }]
      parameters: [{ name: post, in: path, required: true, schema: { type: string } }]
      responses: { "204": { description: Deleted } }
  /posts/{post}/comments:
    parameters: [{ name: post, in: path, required: true, schema: { type: string } }]
    get:
      tags: [Comments]
      summary: List approved comments
      responses: { "200": { description: OK } }
    post:
      tags: [Comments]
      summary: Submit a comment
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CommentInput" }
      responses:
        "201": { description: Created (pending approval) }
        "422": { description: Validation/honeypot error }
        "429": { description: Rate limited }
  /comments/{comment}/approve:
    patch:
      tags: [Comments]
      summary: Approve a comment
      security: [{ sanctum: [] }]
      parameters: [{ name: comment, in: path, required: true, schema: { type: integer } }]
      responses:
        "200": { description: Approved }
        "403": { description: Forbidden }
  /categories:
    get:
      tags: [Categories]
      summary: List categories
      responses: { "200": { description: OK } }
    post:
      tags: [Categories]
      summary: Create a category (admin)
      security: [{ sanctum: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CategoryInput" }
      responses:
        "201": { description: Created }
        "403": { description: Forbidden }
components:
  securitySchemes:
    sanctum:
      type: http
      scheme: bearer
  schemas:
    PostInput:
      type: object
      required: [title, body, status]
      properties:
        title: { type: string, maxLength: 255 }
        slug: { type: string }
        excerpt: { type: string, maxLength: 500 }
        body: { type: string }
        status: { type: string, enum: [draft, scheduled, published, archived] }
        category_id: { type: integer, nullable: true }
        published_at: { type: string, format: date-time, nullable: true }
    CategoryInput:
      type: object
      required: [name]
      properties:
        name: { type: string, maxLength: 255 }
        slug: { type: string }
        description: { type: string, maxLength: 1000 }
    CommentInput:
      type: object
      required: [author_name, body]
      properties:
        author_name: { type: string, maxLength: 100 }
        email: { type: string, format: email }
        body: { type: string, minLength: 2, maxLength: 2000 }
