# Pre-commit hooks for Laranail Packager
# Install: pip install pre-commit && pre-commit install

repos:
  - repo: local
    hooks:
      - id: php-syntax
        name: Check PHP Syntax
        entry: php -l
        language: system
        files: \.php$
      
      - id: phpstan
        name: PHPStan
        entry: vendor/bin/phpstan
        args: [analyse, src, --level=8]
        language: system
        files: \.php$
        pass_filenames: false
      
      - id: php-cs-fixer
        name: PHP CS Fixer
        entry: vendor/bin/php-cs-fixer
        args: [fix]
        language: system
        files: \.php$
      
      - id: pest
        name: Pest Tests
        entry: vendor/bin/pest
        language: system
        pass_filenames: false
        always_run: true
